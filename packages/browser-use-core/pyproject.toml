[build-system]
requires = ["setuptools>=70.1", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "browser-use-core"
version = "0.13.2"
description = "Packaged Browser Use Rust terminal binaries and Python worker resources."
readme = "README.md"
requires-python = ">=3.11,<4.0"
dependencies = [
  "beautifulsoup4>=4.14.3",
  "cdp-use==1.4.5",
  "curl-cffi>=0.13.0",
  "fetch-use==0.4.0",
  "lxml>=6.1.0",
  "pandas>=2.3.3",
  "pillow==12.2.0",
  "pypdf>=6.10.2",
  "requests>=2.31",
  "tabulate>=0.9.0",
  "websocket-client>=1.8",
]

[project.scripts]
browser-use-terminal = "browser_use_core.cli:main"
but = "browser_use_core.cli:tui_main"
browser-use-terminal-ui = "browser_use_core.cli:tui_main"

[tool.setuptools.package-dir]
"" = "src"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
browser_use_core = [
  "bin/*",
  "bin/agent-tools/*",
  "python/llm_browser_worker/*.py",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
